description: >-
  FOCUS-aligned FinOps view of Stable Audio. Stability runs a credit-based platform
  (1 credit = $0.01) shared across all developer-platform models. Stable Audio 2.5
  generations are reported at $0.20 each (20 credits) regardless of duration. API
  Membership ($20/mo) bundles 6,000 credits.
notes: Decide between PAYG credit packs and the $20/mo membership based on monthly Stable Audio call volume.
