principles:
- name: Visibility
  description: Track per-call credit consumption in Stability platform billing dashboard.
- name: Allocation
  description: Tag generations per creative project / consuming product.
- name: Optimization
  description: At ~300+ generations/month consider $20 membership over PAYG to lock in ~3.3K credits effective rate.
- name: Accountability
  description: Assign a credit-budget owner per consuming product.
