description: >-
  Stable Audio (by Stability AI) is a generative audio model for music and sound-effect
  generation. The Stability Developer Platform exposes Stable Audio 2.5 endpoints alongside
  image, video, and 3D generation. Pricing is credit-based at 1 credit = $0.01; Stable
  Audio 2.5 generations are reported at $0.20 per generation regardless of duration.
