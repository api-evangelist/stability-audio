specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Stability Audio
providerId: stability-audio
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Audio
- Music Generation
- SFX
- Stability
- Plans
description: >-
  Stable Audio API runs on the Stability Developer Platform credit-based billing model
  (1 credit = $0.01). Stable Audio 2.5 generations are reported at $0.20 per generation
  through aggregator price sheets and the Stability platform's published rates. Stability
  also offers an API membership at $20/month including 6,000 credits.
notes: Confirm exact credit cost per Stable Audio call on the Stability platform pricing page; aggregator pricing may differ.
sources:
- https://platform.stability.ai/pricing
- https://stability.ai/stable-audio
plans:
- id: stability-audio-credits
  name: Pay-as-you-go (Credits)
  type: usage
  description: Credit-based billing where 1 credit = $0.01 USD.
  entries:
  - label: Stable Audio 2.5 Generation
    name: stable_audio_25
    type: per_unit
    metric: generation
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.20 USD per generation (regardless of duration)
    userMultiplied: false
  - label: Credit Unit
    name: credit
    type: per_unit
    metric: credit
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.01 USD per credit
    userMultiplied: false
- id: stability-audio-membership
  name: API Membership
  type: subscription
  description: Monthly membership including 6,000 credits.
  entries:
  - label: Membership
    name: membership
    type: flat
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 20 USD/month (6,000 credits included)
    userMultiplied: false
- id: stability-audio-enterprise
  name: Enterprise
  type: enterprise
  description: Custom contracts for high-volume customers.
  entries:
  - label: Enterprise Contract
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
maintainers:
