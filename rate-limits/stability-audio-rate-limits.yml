specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Stability Audio
providerId: stability-audio
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Audio
- Music Generation
- SFX
- Stability
- Rate Limiting
- Quotas
- Throttling
description: >-
  Stability Developer Platform rate-limits via account credit balance and per-account RPS
  thresholds. Specific HTTP RPS caps are not publicly documented; standard 429 backoff
  applies. Credit balance must remain positive to call the API.
notes: Maintain positive credit balance to avoid 402 / 429 throttling on Stable Audio calls.
sources:
- https://platform.stability.ai/docs
- https://platform.stability.ai/pricing
responseCodes:
  throttled: 429
  paymentRequired: 402
limits:
- name: Credit Balance
  scope: account
  metric: credits
  limit: prepaid
- name: HTTP Requests
  scope: account
  metric: requests
  limit: not publicly documented
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
- name: Credit Top-Up
  description: Set up auto-recharge or membership to keep balance positive for production workloads.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
